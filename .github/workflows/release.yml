name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_name: Prompturgy-macOS.zip
            build_path: dist/Prompturgy.app
          - os: windows-latest
            asset_name: Prompturgy-Windows.zip
            build_path: dist/Prompturgy.exe
          - os: ubuntu-latest
            asset_name: Prompturgy-Linux.zip
            build_path: dist/Prompturgy

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build app
        run: python build_app.py

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../${{ matrix.asset_name }} Prompturgy.app

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist/Prompturgy.exe -DestinationPath ${{ matrix.asset_name }}
        shell: pwsh

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip ../${{ matrix.asset_name }} Prompturgy

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create/Update release with all platform builds
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
